name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck • test • build (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        # better-sqlite3 ships a native binding that pnpm blocks by
        # default. Rebuild it explicitly so test + build can find it.
        run: pnpm rebuild better-sqlite3

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: npm pack (dry run, smoke)
        run: npm pack --dry-run
